name: Update README

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: r-lib/actions/setup-r@master
    - name: Cache R packages
      uses: actions/cache@v1
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-${{ hashFiles('.github/depends.Rds') }}
        restore-keys: ${{ runner.os }}-${{ hashFiles('.github/R-version') }}-1-
    - name: Install rvest
      run: |
        sudo apt-get install libcurl4-openssl-dev
        Rscript -e 'install.packages("rvest")'
    - name: Compute README
      run: | 
        library(rvest)
        writeLines(
          gsub(
            pattern = "movies \\([0-9,]*\\) and",
            replacement = read_html("https://www.imdb.com/user/ur56341222/ratings") %>%
              html_nodes("div.header.filmosearch") %>%
              html_text() %>%
              gsub(".*\\(of ([^)]*)\\).*", "movies (\\1) and", .),
            x = readLines("README.md")
          ),
          con = "README.md"
        )
      shell: Rscript {0}
    - name: Commit README
      run: | 
        git config --global user.name "${{secrets.NAME}}"
        git config --global user.email ${{secrets.EMAIL}}
        git commit README.md -m 'Update README.Rmd' || echo "No changes to commit"
        git push || echo "No changes to commit"
